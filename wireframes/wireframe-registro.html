<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe - Registro / Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #ffffff;
            color: #333333;
        }

        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: #f0f0f0;
        }

        .card {
            background-color: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            background-color: #cccccc;
            border-radius: 6px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            color: #333333;
        }

        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .tab-button {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #cccccc;
            background-color: #f0f0f0;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #666666;
            text-align: center;
        }

        .tab-button.active {
            background-color: #cccccc;
            color: #ffffff;
            border-color: #999999;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #666666;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 14px;
            background-color: #ffffff;
            height: 40px;
            display: flex;
            align-items: center;
        }

        .input-with-icon {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            background-color: #ffffff;
            height: 44px;
        }

        .icon-placeholder {
            width: 20px;
            height: 20px;
            background-color: #e6e6e6;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .input-placeholder {
            flex: 1;
            height: 20px;
            background-color: #f5f5f5;
            border-radius: 3px;
        }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            cursor: pointer;
            background-color: #ffffff;
        }

        .radio-circle {
            width: 16px;
            height: 16px;
            border: 2px solid #cccccc;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .radio-option.selected {
            border-color: #999999;
            background-color: #f5f5f5;
        }

        .radio-option.selected .radio-circle {
            border-color: #666666;
            background-color: #cccccc;
        }

        .submit-button {
            width: 100%;
            padding: 12px 16px;
            background-color: #cccccc;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            height: 44px;
            margin-top: 8px;
        }

        .forgot-password {
            text-align: center;
            margin-top: 16px;
        }

        .forgot-password a {
            font-size: 13px;
            color: #666666;
            text-decoration: none;
            border-bottom: 1px solid #cccccc;
        }

        .form-note {
            font-size: 12px;
            color: #999999;
            margin-top: 12px;
            text-align: center;
        }

        .section-label {
            font-size: 11px;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 20px 0 12px 0;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .card {
                padding: 24px;
            }

            .logo-section {
                margin-bottom: 20px;
            }

            .tab-button {
                font-size: 13px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-box"></div>
                <div class="logo-text">Vitalid</div>
            </div>

            <!-- Tab Buttons -->
            <div class="tab-buttons">
                <button class="tab-button active">Iniciar Sesión</button>
                <button class="tab-button">Registrarse</button>
            </div>

            <!-- Form Section: LOGIN TAB -->
            <div id="login-form">
                <div class="form-group">
                    <label class="form-label">Correo Electrónico</label>
                    <div class="input-with-icon">
                        <div class="icon-placeholder"></div>
                        <div class="input-placeholder" style="width: 70%;"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <div class="input-with-icon">
                        <div class="icon-placeholder"></div>
                        <div class="input-placeholder" style="width: 70%;"></div>
                    </div>
                </div>

                <button class="submit-button">Iniciar Sesión</button>

                <div class="forgot-password">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>
            </div>

            <!-- Form Section: REGISTER TAB -->
            <div id="register-form" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Nombre Completo</label>
                    <div class="input-with-icon">
                        <div class="icon-placeholder"></div>
                        <div class="input-placeholder" style="width: 70%;"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Correo Electrónico</label>
                    <div class="input-with-icon">
                        <div class="icon-placeholder"></div>
                        <div class="input-placeholder" style="width: 70%;"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Teléfono</label>
                    <div class="input-with-icon">
                        <div class="icon-placeholder"></div>
                        <div class="input-placeholder" style="width: 70%;"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <div class="input-with-icon">
                        <div class="icon-placeholder"></div>
                        <div class="input-placeholder" style="width: 70%;"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Tipo de Usuario</label>
                    <div class="radio-group">
                        <label class="radio-option selected">
                            <div class="radio-circle"></div>
                            <span>Paciente</span>
                        </label>
                        <label class="radio-option">
                            <div class="radio-circle"></div>
                            <span>Doctor</span>
                        </label>
                    </div>
                </div>

                <button class="submit-button">Crear Cuenta</button>
            </div>
        </div>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab-button');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        tabs.forEach((tab, index) => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                if (index === 0) {
                    loginForm.style.display = 'block';
                    registerForm.style.display = 'none';
                } else {
                    loginForm.style.display = 'none';
                    registerForm.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
