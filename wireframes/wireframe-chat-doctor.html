<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe - Chat con Doctor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #ffffff;
            color: #333333;
            height: 100vh;
            display: flex;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100vh;
            flex-direction: column;
        }

        /* Header */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #cccccc;
            background-color: #ffffff;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .back-button {
            display: none;
            width: 32px;
            height: 32px;
            background-color: #f0f0f0;
            border: 1px solid #cccccc;
            border-radius: 6px;
            cursor: pointer;
        }

        .doctor-avatar {
            width: 40px;
            height: 40px;
            background-color: #e6e6e6;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .doctor-info {
            flex: 1;
        }

        .doctor-name {
            font-size: 14px;
            font-weight: 600;
            color: #333333;
        }

        .doctor-status {
            font-size: 12px;
            color: #4caf50;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-button {
            width: 36px;
            height: 36px;
            background-color: #f5f5f5;
            border: 1px solid #e6e6e6;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-small {
            width: 16px;
            height: 16px;
            background-color: #cccccc;
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #ffffff;
        }

        .message {
            display: flex;
            margin-bottom: 4px;
        }

        .message.doctor {
            justify-content: flex-start;
        }

        .message.patient {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.doctor .message-bubble {
            background-color: #f0f0f0;
            color: #333333;
            border: 1px solid #e6e6e6;
        }

        .message.patient .message-bubble {
            background-color: #cccccc;
            color: #ffffff;
        }

        .message-time {
            font-size: 11px;
            color: #999999;
            margin-top: 4px;
            padding: 0 4px;
        }

        .message.patient .message-time {
            color: #999999;
        }

        /* Input Area */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #cccccc;
            background-color: #ffffff;
        }

        .input-toolbar {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin-bottom: 12px;
        }

        .toolbar-button {
            width: 36px;
            height: 36px;
            background-color: #f5f5f5;
            border: 1px solid #e6e6e6;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-medium {
            width: 18px;
            height: 18px;
            background-color: #cccccc;
        }

        .message-input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .message-input {
            flex: 1;
            padding: 10px 14px;
            background-color: #f5f5f5;
            border: 1px solid #e6e6e6;
            border-radius: 20px;
            font-size: 14px;
            min-height: 36px;
            display: flex;
            align-items: center;
        }

        .input-text {
            flex: 1;
            height: 20px;
            background-color: #ffffff;
            border-radius: 2px;
        }

        .send-button {
            width: 36px;
            height: 36px;
            background-color: #cccccc;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .input-note {
            font-size: 11px;
            color: #999999;
            text-align: center;
        }

        @media (max-width: 768px) {
            .back-button {
                display: flex;
            }

            .message-bubble {
                max-width: 85%;
            }

            .header-actions {
                gap: 4px;
            }

            .header-button {
                width: 32px;
                height: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <button class="back-button"></button>
                <div class="doctor-avatar"></div>
                <div class="doctor-info">
                    <div class="doctor-name">Dr. Sarah Johnson</div>
                    <div class="doctor-status">En línea</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-button">
                    <div class="icon-small"></div>
                </button>
                <button class="header-button">
                    <div class="icon-small"></div>
                </button>
                <button class="header-button">
                    <div class="icon-small"></div>
                </button>
            </div>
        </div>

        <!-- Messages -->
        <div class="messages-container">
            <div class="message doctor">
                <div>
                    <div class="message-bubble">Buenos días, ¿cómo te sientes hoy?</div>
                    <div class="message-time">09:30</div>
                </div>
            </div>

            <div class="message patient">
                <div style="text-align: right;">
                    <div class="message-bubble">Muy bien, sin síntomas hoy</div>
                    <div class="message-time">09:32</div>
                </div>
            </div>

            <div class="message doctor">
                <div>
                    <div class="message-bubble">Excelente. ¿Has tomado tus medicinas como indicado?</div>
                    <div class="message-time">09:33</div>
                </div>
            </div>

            <div class="message patient">
                <div style="text-align: right;">
                    <div class="message-bubble">Sí, todas a tiempo</div>
                    <div class="message-time">09:35</div>
                </div>
            </div>

            <div class="message doctor">
                <div>
                    <div class="message-bubble">Perfecto. Por favor envíame tus últimas mediciones</div>
                    <div class="message-time">09:36</div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-toolbar">
                <button class="toolbar-button" title="Adjuntar archivo">
                    <div class="icon-medium"></div>
                </button>
                <button class="toolbar-button" title="Enviar foto">
                    <div class="icon-medium"></div>
                </button>
            </div>

            <div class="message-input-wrapper">
                <div class="message-input">
                    <div class="input-text"></div>
                </div>
                <button class="send-button"></button>
            </div>

            <div class="input-note">
                Puedes enviar fotos de exámenes o documentos PDF
            </div>
        </div>
    </div>
</body>
</html>
