[build]
  command = "pnpm install && pnpm build && cp index.html dist/index.html"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

# SPA fallback: redirect all routes to index.html (landing page)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# SPA fallback for React app routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
