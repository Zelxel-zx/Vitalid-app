[build]
  command = "pnpm install && pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

# Serve landing.html as the homepage
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200

# SPA fallback for React app routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
